<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <!-- Bar 1 (left, short) -->
  <!-- Front -->
  <polygon points="2,19 8,19 8,26 2,26" fill="url(#b1)"/>
  <!-- Top -->
  <polygon points="2,19 8,19 11,17 5,17" fill="#fce7f3"/>
  <!-- Side -->
  <polygon points="8,19 11,17 11,24 8,26" fill="#9d174d"/>

  <!-- Bar 2 (middle, tallest) -->
  <!-- Front -->
  <polygon points="12,10 18,10 18,26 12,26" fill="url(#b3)"/>
  <!-- Top -->
  <polygon points="12,10 18,10 21,8 15,8" fill="#fdf2f8"/>
  <!-- Side -->
  <polygon points="18,10 21,8 21,24 18,26" fill="#831843"/>

  <!-- Bar 3 (right, medium) -->
  <!-- Front -->
  <polygon points="22,14 28,14 28,26 22,26" fill="url(#b2)"/>
  <!-- Top -->
  <polygon points="22,14 28,14 31,12 25,12" fill="#fce7f3"/>
  <!-- Side -->
  <polygon points="28,14 31,12 31,24 28,26" fill="#be185d"/>

  <!-- Base line -->
  <line x1="1" y1="26" x2="31" y2="26" stroke="#be185d" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Y axis -->
  <line x1="1" y1="7" x2="1" y2="27" stroke="#be185d" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
